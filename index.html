<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAU SUBMISSION</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <form action="submit.html" method="GET" class="form">
        <h1>SUBMISSION!</h1>
        <img src="img/logo.png" alt="Logo">
        <p>Isi Form Dibawah ini kalau kamu siap Submission!</p>
        
        <label for="nama">Nama:</label>
        <input type="text" id="nama" name="nama" required placeholder="Random Forest"><br><br>

        <label for="kelas">Kelas:</label>
        <input type="text" id="kelas" name="kelas" required placeholder="Kelas A"><br><br>
        
        <label for="prodi">Prodi:</label>
        <input type="text" id="prodi" name="prodi" required placeholder="Teknik Informatika"><br><br>

        <div class="checkbox-group">
            <input type="checkbox" id="siap" name="siap" required>
            <label for="siap">Saya siap untuk submission!</label>
        </div>

        <input type="submit" value="Submit">
    </form>
</body>
<script src="js/script.js"></script>
</html>
